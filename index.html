<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inom? Tara?</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    color-scheme: dark;
    --bg: #050816;
    --surface: rgba(16, 30, 60, 0.75);
    --surface-strong: rgba(255, 255, 255, 0.12);
    --text: #f5f7ff;
    --muted: #94a3b8;
    --primary: #5dd9c1;
    --accent: #f97316;
    --shadow: 0 35px 80px rgba(0, 0, 0, 0.32);
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
html, body {
    min-height: 100%;
}
body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 24%),
                radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.16), transparent 24%),
                linear-gradient(180deg, #050816 0%, #0b1225 100%);
    color: var(--text);
    display: grid;
    place-items: center;
    padding: 24px;
}
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 15% 20%, rgba(255,255,255,.08) 0, transparent 24%),
                      radial-gradient(circle at 80% 10%, rgba(93, 217, 193, .1) 0, transparent 20%),
                      radial-gradient(circle at 50% 90%, rgba(249, 115, 22, .08) 0, transparent 18%);
    pointer-events: none;
}
.card {
    position: relative;
    width: min(100%, 520px);
    padding: 36px;
    border-radius: 28px;
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(22px);
    box-shadow: var(--shadow);
    overflow: hidden;
}
.card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, rgba(255,255,255,.06), transparent 55%);
    pointer-events: none;
}
.card-content {
    position: relative;
    z-index: 1;
}
.hero {
    text-align: center;
    margin-bottom: 32px;
}
.hero h1 {
    font-size: clamp(2.2rem, 4vw, 3.2rem);
    letter-spacing: -0.04em;
    margin-bottom: 12px;
}
.hero p {
    color: var(--muted);
    font-size: 1rem;
}
.button-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-bottom: 28px;
}
.button-row button {
    min-width: 140px;
    border: none;
    border-radius: 999px;
    padding: 14px 22px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.28s ease, box-shadow 0.28s ease, opacity 0.28s ease;
    box-shadow: 0 18px 30px rgba(0, 0, 0, 0.18);
}
.button-row button:hover {
    transform: translateY(-2px);
}
#taraBtn {
    color: #fff;
    background: linear-gradient(135deg, #34d399, #10b981);
}
#passBtn {
    color: #fff;
    background: linear-gradient(135deg, #fb7185, #f97316);
}
.form {
    display: none;
    animation: slideIn 0.45s ease both;
}
.form-field {
    display: grid;
    gap: 10px;
    margin-top: 18px;
}
.form input,
.form select {
    width: 100%;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 14px 16px;
    font-size: 0.98rem;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease;
}
.form option {
    color: var(--text);
    background: #0b1225;
}
.form input:focus,
.form select:focus {
    border-color: rgba(93, 217, 193, 0.75);
    background: rgba(255,255,255,0.12);
}
.form label {
    color: var(--muted);
    font-size: 0.85rem;
}
.submit {
    width: 100%;
    margin-top: 24px;
    background: linear-gradient(135deg, #38bdf8, #0284c7);
    color: #fff;
    border-radius: 16px;
    padding: 15px 0;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    box-shadow: 0 16px 30px rgba(3, 66, 116, 0.24);
    transition: transform 0.25s ease, filter 0.25s ease;
}
.submit:hover {
    transform: translateY(-1px);
    filter: brightness(1.05);
}
#message {
    display: none;
    margin-top: 28px;
    padding: 24px;
    border-radius: 22px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #f8fafc;
    line-height: 1.6;
}
#message b {
    color: #fff;
}
@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(18px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>
<body>
<div class="card">
    <div class="card-content">
        <section class="hero">
            <h1>🍻 Inom?</h1>
            <p>Simple invitation flow for when you want to say “Tara?” the modern way.</p>
        </section>
        <div class="button-row">
            <button id="taraBtn">TARA ❤️</button>
            <button id="passBtn">PASS 😅</button>
        </div>
        <form class="form" id="form" onsubmit="event.preventDefault(); submitForm();">
            <div class="form-field">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>
            <div class="form-field">
                <label for="date">When</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-field">
                <label for="time">Time slot</label>
                <select id="time" required>
                    <option value="">Choose a time</option>
                    <option>6:00 PM - 8:00 PM</option>
                    <option>8:00 PM - 10:00 PM</option>
                    <option>10:00 PM - 12:00 AM</option>
                    <option>1:00 AM - 5:00 AM</option>
                </select>
            </div>
            <div class="form-field">
                <label for="location">Location</label>
                <select id="location" required>
                    <option value="">Choose location</option>
                    <option>HOUSE NYO</option>
                </select>
            </div>
            <button type="submit" class="submit">Confirm</button>
        </form>
        <div id="message"></div>
    </div>
</div>
<script>
const taraBtn = document.getElementById('taraBtn');
const passBtn = document.getElementById('passBtn');
const buttons = document.querySelector('.button-row');
const form = document.getElementById('form');
const message = document.getElementById('message');
let passClicks = 0;

taraBtn.addEventListener('click', () => {
    buttons.style.display = 'none';
    form.style.display = 'block';
    message.style.display = 'none';
    message.innerHTML = '';
});

passBtn.addEventListener('click', () => {
    passClicks += 1;
    if (passClicks >= 2) {
        passBtn.style.display = 'none';
    }
    form.style.display = 'none';
    message.style.display = 'none';
    message.innerHTML = '';
});

function submitForm() {
    const name = document.getElementById('name').value.trim();
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    const location = document.getElementById('location').value;

    if (!name || !date || !time || !location) {
        alert('Please complete the form.');
        return;
    }

    form.style.display = 'none';
    message.style.display = 'block';
    message.innerHTML =
        `🥳 See you, <b>${name}</b>!<br><br>` +
        `📅 ${date}<br>` +
        `🕒 ${time}<br>` +
        `📍 ${location}<br><br>` +
        `🍻 See you there!`;
}
</script>

</body>
</html>
